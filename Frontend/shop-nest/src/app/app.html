<div class="app-layout">
  <!-- Sidebar Container -->
  <aside class="app-sidebar" [class.active]="isSidebarOpen()">
    <div class="sidebar-header">
      <a class="brand" routerLink="/catalog" (click)="closeSidebar()" aria-label="ShopNest home">
        <span class="brand-mark">S</span>
        <span class="brand-text">ShopNest</span>
      </a>
      <button class="sidebar-close-btn" type="button" (click)="closeSidebar()" aria-label="Close sidebar">×</button>
    </div>

    <nav class="sidebar-nav">
      <a routerLink="/catalog" routerLinkActive="active" (click)="closeSidebar()">
        <span class="nav-icon">🛍️</span>
        <span>Catalog</span>
      </a>
      <a routerLink="/cart" routerLinkActive="active" *ngIf="api.currentUser()" (click)="closeSidebar()">
        <span class="nav-icon">🛒</span>
        <span>Cart</span>
        <span class="badge" *ngIf="api.cartItemCount() > 0">{{ api.cartItemCount() }}</span>
      </a>
      <a routerLink="/orders" routerLinkActive="active" *ngIf="api.currentUser()" (click)="closeSidebar()">
        <span class="nav-icon">📦</span>
        <span>Orders</span>
      </a>
      <a routerLink="/admin" routerLinkActive="active" *ngIf="api.currentUser()?.role === 'Admin'" (click)="closeSidebar()">
        <span class="nav-icon">🛡️</span>
        <span>Admin Portal</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <!-- Connection Status Indicator -->
      <div class="connection-status" [attr.data-state]="signalr.connectionState().toLowerCase()">
        <span class="status-dot"></span>
        <span class="status-text">{{ signalr.connectionState() }}</span>
      </div>

      <!-- Theme Toggle & Profile Info -->
      <div class="profile-card" *ngIf="api.currentUser() as user">
        <div class="profile-avatar">
          {{ user.fullName.charAt(0).toUpperCase() }}
        </div>
        <div class="profile-info">
          <div class="profile-name">{{ user.fullName }}</div>
          <div class="profile-role">{{ user.role }}</div>
        </div>
      </div>

      <div class="footer-actions">
        <button class="icon-btn theme-toggle" type="button" (click)="toggleTheme()" [title]="isDarkTheme() ? 'Switch to Light Mode' : 'Switch to Dark Mode'">
          <span *ngIf="!isDarkTheme()">🌙</span>
          <span *ngIf="isDarkTheme()">☀️</span>
        </button>

        <ng-container *ngIf="api.currentUser(); else loginBtn">
          <button class="ghost logout-btn" type="button" (click)="logout()">
            <span>Logout</span>
          </button>
        </ng-container>
        <ng-template #loginBtn>
          <a class="primary login-btn" routerLink="/login" (click)="closeSidebar()">Login</a>
        </ng-template>
      </div>
    </div>
  </aside>

  <!-- Overlay for Mobile Sidebar -->
  <div class="sidebar-overlay" [class.active]="isSidebarOpen()" (click)="closeSidebar()"></div>

  <!-- Main Content Area Wrapper -->
  <div class="app-content-wrapper">
    <!-- Topbar for Mobile Header / Desktop Context Actions -->
    <header class="app-topbar">
      <button class="hamburger-btn" type="button" (click)="toggleSidebar()" aria-label="Open navigation menu">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <div class="topbar-brand-mobile">
        <span class="brand-mark">S</span>
        <span>ShopNest</span>
      </div>

      <div class="topbar-actions">
        <button class="icon-btn theme-toggle-mobile" type="button" (click)="toggleTheme()">
          <span *ngIf="!isDarkTheme()">🌙</span>
          <span *ngIf="isDarkTheme()">☀️</span>
        </button>

        <div class="connection-status-pill-mobile" [attr.data-state]="signalr.connectionState().toLowerCase()" [title]="'Real-time Connection: ' + signalr.connectionState()">
          <span class="status-dot"></span>
        </div>
      </div>
    </header>

    <!-- App Main Router Outlet -->
    <main class="app-main">
      <router-outlet />
    </main>
  </div>
</div>
