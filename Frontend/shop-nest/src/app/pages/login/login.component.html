<section class="auth-shell">
  <form class="panel auth-panel" (ngSubmit)="submit()">
    <div>
      <p class="eyebrow">ShopNest</p>
      <h1>{{ mode === 'login' ? 'Sign in' : 'Create account' }}</h1>
    </div>

    <div class="segmented">
      <button type="button" [class.active]="mode === 'login'" (click)="mode = 'login'">Login</button>
      <button type="button" [class.active]="mode === 'register'" (click)="mode = 'register'">Register</button>
    </div>

    <label *ngIf="mode === 'register'">
      Full name
      <input name="fullName" [(ngModel)]="fullName" required />
    </label>

    <label>
      Email
      <input type="email" name="email" [(ngModel)]="email" required />
    </label>

    <label>
      Password
      <input type="password" name="password" [(ngModel)]="password" required minlength="6" />
    </label>

    <label *ngIf="mode === 'register'">
      Role
      <select name="role" [(ngModel)]="role">
        <option value="Customer">Customer</option>
        <option value="Admin">Admin</option>
      </select>
    </label>

    <p class="error" *ngIf="error">{{ error }}</p>
    <button class="primary" type="submit" [disabled]="loading">{{ loading ? 'Please wait' : 'Continue' }}</button>
  </form>
</section>
