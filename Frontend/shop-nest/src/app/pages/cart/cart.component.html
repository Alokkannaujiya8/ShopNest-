<section class="page-head">
  <div>
    <p class="eyebrow">Checkout</p>
    <h1>Cart</h1>
  </div>
</section>

<section class="split">
  <div class="panel">
    <div class="line-item" *ngFor="let item of cart?.items">
      <div>
        <strong>{{ item.productName }}</strong>
        <p>{{ item.unitPrice | currency: 'INR' }} each</p>
      </div>
      <input type="number" min="1" [ngModel]="item.quantity" (ngModelChange)="update(item.id, +$event)" />
      <strong>{{ item.lineTotal | currency: 'INR' }}</strong>
      <button class="icon" type="button" title="Remove item" (click)="remove(item.id)">×</button>
    </div>
    <p class="muted" *ngIf="!cart?.items?.length">Your cart is empty.</p>
  </div>

  <form class="panel summary" (ngSubmit)="checkout()">
    <h2>Order summary</h2>
    <div class="row total">
      <span>Total</span>
      <strong>{{ cart?.total || 0 | currency: 'INR' }}</strong>
    </div>
    <label>
      Shipping address
      <textarea name="shippingAddress" [(ngModel)]="shippingAddress" required rows="5"></textarea>
    </label>
    <button class="primary" type="submit" [disabled]="!cart?.items?.length || !shippingAddress">Checkout</button>
    <p class="notice" *ngIf="message">{{ message }}</p>
  </form>
</section>
