<section class="auth-shell">
  <form class="panel auth-panel" [formGroup]="resetForm" (ngSubmit)="onSubmit()">
    <div class="auth-header">
      <p class="eyebrow">ShopNest Security</p>
      <h1>Reset Password</h1>
      <p class="auth-subtitle">Create your new secure portal credentials</p>
    </div>

    <!-- OTP Code Input -->
    <label class="form-field">
      <span>6-Digit Reset OTP Code</span>
      <input 
        type="text" 
        formControlName="otp" 
        placeholder="••••••"
        maxlength="6"
        [class.invalid]="resetForm.controls.otp.touched && resetForm.controls.otp.invalid"
      />
      <span class="error" *ngIf="resetForm.controls.otp.touched && resetForm.controls.otp.errors?.['required']">
        OTP code is required.
      </span>
      <span class="error" *ngIf="resetForm.controls.otp.touched && resetForm.controls.otp.errors?.['invalidOtp']">
        OTP must be a 6-digit numeric code.
      </span>
    </label>

    <!-- New Password Field -->
    <label class="form-field">
      <span>New Password</span>
      <div class="password-input-wrapper">
        <input 
          [type]="showPassword() ? 'text' : 'password'" 
          formControlName="password" 
          placeholder="••••••••"
          (input)="onPasswordInput(passwordInput.value)"
          #passwordInput
          [class.invalid]="resetForm.controls.password.touched && resetForm.controls.password.invalid"
        />
        <button 
          type="button" 
          class="password-toggle-btn"
          (click)="showPassword.set(!showPassword())"
          [title]="showPassword() ? 'Hide Password' : 'Show Password'"
        >
          <span>{{ showPassword() ? '👁️' : '🔒' }}</span>
        </button>
      </div>
      <span class="error" *ngIf="resetForm.controls.password.touched && resetForm.controls.password.errors?.['required']">
        Password is required.
      </span>
      <span class="error" *ngIf="resetForm.controls.password.touched && resetForm.controls.password.errors?.['passwordStrength']">
        Must contain uppercase, lowercase, number, special char, and be 8+ chars.
      </span>
    </label>

    <!-- Password Strength Meter -->
    <div class="strength-meter" *ngIf="resetForm.controls.password.value">
      <div class="strength-track">
        <div class="strength-fill" [ngClass]="strengthClass()"></div>
      </div>
      <span class="strength-text">Password Strength: <strong>{{ strengthLabel() }}</strong></span>
    </div>

    <!-- Confirm Password Field -->
    <label class="form-field">
      <span>Confirm New Password</span>
      <div class="password-input-wrapper">
        <input 
          [type]="showConfirmPassword() ? 'text' : 'password'" 
          formControlName="confirmPassword" 
          placeholder="••••••••"
          [class.invalid]="resetForm.controls.confirmPassword.touched && resetForm.controls.confirmPassword.invalid"
        />
        <button 
          type="button" 
          class="password-toggle-btn"
          (click)="showConfirmPassword.set(!showConfirmPassword())"
          [title]="showConfirmPassword() ? 'Hide Password' : 'Show Password'"
        >
          <span>{{ showConfirmPassword() ? '👁️' : '🔒' }}</span>
        </button>
      </div>
      <span class="error" *ngIf="resetForm.controls.confirmPassword.touched && resetForm.errors?.['mustMatch']">
        Passwords do not match.
      </span>
    </label>

    <!-- Timer / Resend OTP -->
    <div class="otp-actions">
      <div class="timer-text" *ngIf="!canResend()">
        Resend code in <strong>{{ formattedTime() }}</strong>
      </div>
      <button 
        type="button" 
        class="resend-btn" 
        *ngIf="canResend()" 
        (click)="resendOtp()" 
        [disabled]="loading()"
      >
        Resend OTP
      </button>
    </div>

    <!-- Submit Button -->
    <button class="primary" type="submit" [disabled]="loading() || resetForm.invalid">
      <span *ngIf="loading()">Saving new password...</span>
      <span *ngIf="!loading()">Reset Password</span>
    </button>

    <div class="back-link-container">
      <a routerLink="/auth/login" class="back-link">
        Back to Login
      </a>
    </div>
  </form>
</section>
