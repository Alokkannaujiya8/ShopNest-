<section class="auth-shell">
  <form class="panel auth-panel" [formGroup]="forgotForm" (ngSubmit)="onSubmit()">
    <div class="auth-header">
      <p class="eyebrow">ShopNest Security</p>
      <h1>Forgot Password</h1>
      <p class="auth-subtitle">Recover access to your retail dashboard</p>
    </div>

    <p class="instructions">
      Enter your email address and we will dispatch a 6-digit OTP code to verify identity and reset your credentials.
    </p>

    <!-- Email Field -->
    <label class="form-field">
      <span>Email Address</span>
      <input 
        type="email" 
        formControlName="email" 
        placeholder="name@example.com"
        [class.invalid]="forgotForm.controls.email.touched && forgotForm.controls.email.invalid"
      />
      <span class="error" *ngIf="forgotForm.controls.email.touched && forgotForm.controls.email.errors?.['required']">
        Email is required.
      </span>
      <span class="error" *ngIf="forgotForm.controls.email.touched && forgotForm.controls.email.errors?.['email']">
        Please enter a valid email.
      </span>
    </label>

    <!-- Submit Button -->
    <button class="primary" type="submit" [disabled]="loading() || forgotForm.invalid">
      <span *ngIf="loading()">Sending OTP...</span>
      <span *ngIf="!loading()">Send Reset OTP</span>
    </button>

    <div class="back-link-container">
      <a routerLink="/auth/login" class="back-link">
        Back to Login
      </a>
    </div>
  </form>
</section>
