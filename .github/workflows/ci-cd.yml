name: ShopNest CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test-backend:
    name: Build & Test Backend
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore Backend Dependencies
      run: dotnet restore ShopNest.API/ShopNest.API.slnx

    - name: Build Backend
      run: dotnet build ShopNest.API/ShopNest.API.slnx --configuration Release --no-restore

    - name: Run Backend Tests
      run: dotnet test ShopNest.API/ShopNest.API.slnx --configuration Release --no-build --verbosity normal

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: Frontend/package-lock.json

    - name: Install Frontend Dependencies
      run: |
        cd Frontend
        npm ci

    - name: Build Frontend (Production)
      run: |
        cd Frontend
        npm run build -- --configuration=production

  docker-build:
    name: Package Docker Images
    needs: [build-and-test-backend, build-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: actions/setup-buildx-action@v3

    - name: Build API Docker Image
      run: |
        cd ShopNest.API
        docker build -t shopnest-api:latest -f Dockerfile .
